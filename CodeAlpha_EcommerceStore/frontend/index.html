<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecommerce Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav>
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="#register">Register</a>
    <a href="#login">Login</a>
    <a href="#profile">Profile</a>
  </nav>

  <!-- Store Heading -->
  <header>
    <h1>Welcome To My Store</h1>
  </header>

  <!-- Search Section -->
  <section id="search">
    <input id="searchBox" type="text" placeholder="Search products...">
    <button onclick="searchProducts()">Search</button>
  </section>

  <!-- User Profile -->
  <section id="profile-section">
    <h2>User Profile</h2>
    <div id="profile"></div>
    <button onclick="showProfile()">View Profile</button>
  </section>

  <!-- Registration -->
  <section id="register" class="form-card">
    <h2>Register</h2>
    <input id="regUsername" type="text" placeholder="Username">
    <input id="regPassword" type="password" placeholder="Password">
    <button onclick="registerUser(
      document.getElementById('regUsername').value,
      document.getElementById('regPassword').value
    )">Register</button>
  </section>

  <!-- Login -->
  <section id="login" class="form-card">
    <h2>Login</h2>
    <input id="username" type="text" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="loginUser(
      document.getElementById('username').value,
      document.getElementById('password').value
    )">Login</button>
  </section>

  <!-- Products -->
  <section id="product-list">
    <h2>Products</h2>
    <div id="products"></div>
  </section>

  <!-- Orders -->
  <section id="orders-section">
    <h2>Your Orders</h2>
    <div id="orders"></div>
    <button onclick="getOrders()">View My Orders</button>
    <button onclick="placeOrder()">Checkout</button>
  </section>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>
</html>
